<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>車屋さんのお知らせ便｜LINE連携</title>
<style>
  body{font-family:"メイリオ",sans-serif;background:#f5f7fa;color:#222;margin:0;
    display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);
    padding:32px 24px;max-width:360px;width:100%;text-align:center}
  h1{font-size:18px;margin:0 0 8px}
  p{font-size:14px;line-height:1.7;color:#555;margin:8px 0}
  .ok{color:#06c755;font-weight:bold;font-size:16px}
  .ng{color:#e53935;font-weight:bold}
  .spinner{margin:16px auto;width:32px;height:32px;border:4px solid #e0e0e0;
    border-top-color:#06c755;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head><body>
<div class="card">
  <h1>車屋さんのお知らせ便</h1>
  <div id="state"><div class="spinner"></div><p>LINE連携の準備をしています…</p></div>
</div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const LIFF_ID = "2010456488-USuaw3dX";
const API = "https://hmumdqmsiafaiktczorw.supabase.co/functions/v1/link";
const $ = (h)=>{document.getElementById("state").innerHTML=h;};
function getToken(){
  const u = new URLSearchParams(location.search);
  let t = u.get("token");
  if(t) return t;
  // LIFFログイン後は token が liff.state に包まれて戻ることがある
  const st = u.get("liff.state");
  if(st){ return new URLSearchParams(st.replace(/^\?/, "")).get("token"); }
  return null;
}

async function main(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }   // ログイン後この画面に戻る
    const token = getToken();                          // init後に取得（liff.state展開後）
    if(!token){ $('<p class="ng">無効なURLです。</p><p>店舗から案内されたQRコードを読み取ってください。</p>'); return; }
    const profile = await liff.getProfile();
    const res = await fetch(API, {
      method:"POST",
      headers:{ "content-type":"application/json" },
      body: JSON.stringify({ token, userId: profile.userId, displayName: profile.displayName })
    });
    const data = await res.json();
    if(data.ok){
      $('<p class="ok">連携が完了しました ✅</p><p>'+ (data.name||"") +' 様<br>車検のお知らせをLINEでお届けします。</p>');
    }else{
      $('<p class="ng">連携できませんでした。</p><p>お手数ですが店舗スタッフにお声がけください。</p>');
    }
  }catch(e){
    $('<p class="ng">エラーが発生しました。</p><p>'+ (e && e.message ? e.message : "") +'</p>');
  }
}
main();
</script>
</body></html>
